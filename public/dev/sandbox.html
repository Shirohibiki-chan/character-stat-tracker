<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stat Card Sandbox — CharSnap</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Figtree:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700;800&family=Lexend:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&family=Playfair+Display:wght@400;500;600;700;800&family=DM+Serif+Display&family=Bebas+Neue&family=Unbounded:wght@400;500;600;700;800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/dist/tabler-icons.min.css" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0e1a;
  color: #e0e6f0;
  font-family: system-ui, sans-serif;
  font-size: 14px;
  min-height: 100vh;
  padding: 24px 20px;
}

/* ── Controls ─────────────────────────────────────────────────── */
.controls {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 20px;
  padding: 18px 20px;
  background: #111520;
  border: 1px solid #1f2538;
  border-radius: 10px;
  margin-bottom: 24px;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.control-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #6e7a8a;
  font-weight: 600;
}

select {
  background: #1a2030;
  border: 1px solid #2a3448;
  border-radius: 6px;
  color: #c8d4e0;
  font-size: 13px;
  padding: 7px 10px;
  outline: none;
  cursor: pointer;
  min-width: 180px;
}

select:focus { border-color: #4ba8c4; }

.size-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

input[type="range"] {
  width: 130px;
  height: 6px;
  accent-color: #4ba8c4;
  cursor: pointer;
  border: none;
  background: transparent;
  padding: 0;
}

.size-readout {
  font-size: 11px;
  color: #4ba8c4;
  font-weight: 700;
  min-width: 30px;
  font-variant-numeric: tabular-nums;
}

.colors-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

.color-swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.color-swatch .control-label {
  font-size: 9px;
}

input[type="color"] {
  width: 38px;
  height: 38px;
  border: 1px solid #2a3448;
  border-radius: 6px;
  padding: 2px;
  background: #1a2030;
  cursor: pointer;
}

/* ── Actions ──────────────────────────────────────────────────── */
.actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}

button {
  padding: 8px 15px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s;
  letter-spacing: 0.02em;
}

button:hover { opacity: 0.82; }

.btn-export {
  background: #4ba8c4;
  color: #04101a;
}

.btn-reset {
  background: #1e2538;
  color: #8090a8;
  border: 1px solid #2a3448;
}

.copy-confirm {
  font-size: 11px;
  color: #5ba87f;
  font-weight: 700;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
}

.copy-confirm.show { opacity: 1; }

/* ── Card grid ────────────────────────────────────────────────── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

@media (max-width: 680px) {
  .card-grid { grid-template-columns: repeat(2, 1fr); }
  .controls { gap: 16px; }
  .actions { margin-left: 0; width: 100%; }
}

/* ── Stat card ────────────────────────────────────────────────── */
.stat-card {
  background: #141826;
  border: 1px solid #1f2538;
  border-radius: 8px;
  padding: 18px 12px 16px;
  text-align: center;
}

.stat-label {
  color: #b0bac8;
  font-size: 11px;
  letter-spacing: 1.5px;
  font-weight: 500;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.stat-icon {
  font-size: 16px;
  margin-bottom: 8px;
  display: block;
  opacity: 0.7;
}

.stat-number {
  line-height: 1;
  margin-bottom: 8px;
  font-feature-settings: 'tnum';
  /* font-family / font-weight / font-size set by JS */
}

.stat-delta {
  font-size: 11px;
  font-weight: 600;
}

.delta-pos { color: #5ba87f; }
.delta-neg { color: #d97373; }
</style>
</head>
<body>

<!-- ── Control panel ─────────────────────────────────────────── -->
<div class="controls">

  <div class="control-group">
    <span class="control-label">Font</span>
    <select id="ctrl-font">
      <option value="Inter">Inter</option>
      <option value="Figtree">Figtree</option>
      <option value="Outfit">Outfit</option>
      <option value="Manrope">Manrope</option>
      <option value="Space Grotesk">Space Grotesk</option>
      <option value="Plus Jakarta Sans">Plus Jakarta Sans</option>
      <option value="DM Sans">DM Sans</option>
      <option value="Lexend">Lexend</option>
      <option value="Sora">Sora</option>
      <option value="Poppins">Poppins</option>
      <option value="JetBrains Mono">JetBrains Mono</option>
      <option value="IBM Plex Mono">IBM Plex Mono</option>
      <option value="Playfair Display">Playfair Display</option>
      <option value="DM Serif Display">DM Serif Display</option>
      <option value="Bebas Neue">Bebas Neue</option>
      <option value="Unbounded">Unbounded</option>
      <option value="Syne">Syne</option>
    </select>
  </div>

  <div class="control-group">
    <span class="control-label">Weight</span>
    <select id="ctrl-weight">
      <option value="400">400</option>
      <option value="500">500</option>
      <option value="600">600</option>
      <option value="700">700</option>
      <option value="800">800</option>
      <option value="900">900</option>
    </select>
  </div>

  <div class="control-group">
    <span class="control-label">Size — <span id="size-readout">34px</span></span>
    <div class="size-row">
      <input type="range" id="ctrl-size" min="24" max="56" value="34" step="1">
    </div>
  </div>

  <div class="control-group">
    <span class="control-label">Accent colors</span>
    <div class="colors-row">
      <div class="color-swatch">
        <span class="control-label">Bots</span>
        <input type="color" id="ctrl-color-bots" value="#4ba8c4">
      </div>
      <div class="color-swatch">
        <span class="control-label">Msgs</span>
        <input type="color" id="ctrl-color-messages" value="#5ba87f">
      </div>
      <div class="color-swatch">
        <span class="control-label">Thds</span>
        <input type="color" id="ctrl-color-threads" value="#9d8fd4">
      </div>
      <div class="color-swatch">
        <span class="control-label">Favs</span>
        <input type="color" id="ctrl-color-favorites" value="#d48aa0">
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-export" id="btn-export">Copy CSS</button>
    <span class="copy-confirm" id="copy-confirm">copied!</span>
    <button class="btn-reset" id="btn-reset">Reset</button>
  </div>

</div>

<!-- ── Preview ───────────────────────────────────────────────── -->
<div class="card-grid">

  <div class="stat-card" data-card="bots">
    <div class="stat-label">Total Bots</div>
    <i class="stat-icon ti ti-robot"></i>
    <div class="stat-number">60</div>
    <div class="stat-delta delta-pos">+2 this week</div>
  </div>

  <div class="stat-card" data-card="messages">
    <div class="stat-label">Total Messages</div>
    <i class="stat-icon ti ti-messages"></i>
    <div class="stat-number">89.6M</div>
    <div class="stat-delta delta-pos">+312K this week</div>
  </div>

  <div class="stat-card" data-card="threads">
    <div class="stat-label">Total Threads</div>
    <i class="stat-icon ti ti-message-circle"></i>
    <div class="stat-number">257.8K</div>
    <div class="stat-delta delta-neg">−340 this week</div>
  </div>

  <div class="stat-card" data-card="favorites">
    <div class="stat-label">Total Favorites</div>
    <i class="stat-icon ti ti-heart"></i>
    <div class="stat-number">39.8K</div>
    <div class="stat-delta delta-pos">+47 this week</div>
  </div>

</div>

<script>
const STORAGE_KEY = 'charsnap-sandbox-v1';

const DEFAULTS = {
  font:           'Inter',
  weight:         '800',
  size:           '34',
  colorBots:      '#4ba8c4',
  colorMessages:  '#5ba87f',
  colorThreads:   '#9d8fd4',
  colorFavorites: '#d48aa0',
};

const ctrl = {
  font:           document.getElementById('ctrl-font'),
  weight:         document.getElementById('ctrl-weight'),
  size:           document.getElementById('ctrl-size'),
  sizeReadout:    document.getElementById('size-readout'),
  colorBots:      document.getElementById('ctrl-color-bots'),
  colorMessages:  document.getElementById('ctrl-color-messages'),
  colorThreads:   document.getElementById('ctrl-color-threads'),
  colorFavorites: document.getElementById('ctrl-color-favorites'),
  exportBtn:      document.getElementById('btn-export'),
  resetBtn:       document.getElementById('btn-reset'),
  copyConfirm:    document.getElementById('copy-confirm'),
};

function getState() {
  return {
    font:           ctrl.font.value,
    weight:         ctrl.weight.value,
    size:           ctrl.size.value,
    colorBots:      ctrl.colorBots.value,
    colorMessages:  ctrl.colorMessages.value,
    colorThreads:   ctrl.colorThreads.value,
    colorFavorites: ctrl.colorFavorites.value,
  };
}

function applyState(state) {
  ctrl.sizeReadout.textContent = state.size + 'px';

  document.querySelectorAll('.stat-number').forEach(el => {
    el.style.fontFamily  = "'" + state.font + "', system-ui, sans-serif";
    el.style.fontWeight  = state.weight;
    el.style.fontSize    = state.size + 'px';
  });

  const colorMap = {
    bots:      state.colorBots,
    messages:  state.colorMessages,
    threads:   state.colorThreads,
    favorites: state.colorFavorites,
  };

  Object.entries(colorMap).forEach(function([card, color]) {
    document.querySelectorAll('[data-card="' + card + '"] .stat-number, [data-card="' + card + '"] .stat-icon').forEach(function(el) {
      el.style.color = color;
    });
  });
}

function restoreControls(state) {
  ctrl.font.value           = state.font;
  ctrl.weight.value         = state.weight;
  ctrl.size.value           = state.size;
  ctrl.colorBots.value      = state.colorBots;
  ctrl.colorMessages.value  = state.colorMessages;
  ctrl.colorThreads.value   = state.colorThreads;
  ctrl.colorFavorites.value = state.colorFavorites;
}

function loadSaved() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? Object.assign({}, DEFAULTS, JSON.parse(raw)) : Object.assign({}, DEFAULTS);
  } catch(e) { return Object.assign({}, DEFAULTS); }
}

var saveTimer;
function onAnyChange() {
  var state = getState();
  applyState(state);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }, 300);
}

[ctrl.font, ctrl.weight, ctrl.size, ctrl.colorBots, ctrl.colorMessages, ctrl.colorThreads, ctrl.colorFavorites]
  .forEach(function(el) { el.addEventListener('input', onAnyChange); });

ctrl.exportBtn.addEventListener('click', function() {
  var s = getState();
  var css = ':root {\n'
    + '  --stat-font-family: ' + s.font + ';\n'
    + '  --stat-font-weight: ' + s.weight + ';\n'
    + '  --stat-font-size: '   + s.size + 'px;\n'
    + '  --accent-bots: '      + s.colorBots + ';\n'
    + '  --accent-messages: '  + s.colorMessages + ';\n'
    + '  --accent-threads: '   + s.colorThreads + ';\n'
    + '  --accent-favorites: ' + s.colorFavorites + ';\n'
    + '}';
  navigator.clipboard.writeText(css).then(function() {
    ctrl.copyConfirm.classList.add('show');
    setTimeout(function() { ctrl.copyConfirm.classList.remove('show'); }, 2000);
  });
});

ctrl.resetBtn.addEventListener('click', function() {
  if (!confirm('Reset all controls to defaults?')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
});

// Init on load
var initial = loadSaved();
restoreControls(initial);
applyState(initial);
</script>

</body>
</html>
